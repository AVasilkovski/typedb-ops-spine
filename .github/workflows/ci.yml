name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        typedb-version: ["3.8.0"]
      fail-fast: true

    services:
      typedb:
        image: typedb/typedb:${{ matrix.typedb-version }}
        ports:
          - 1729:1729

    env:
      PYTHONPATH: .
      TYPEDB_ADDRESS: "localhost:1729"
      TYPEDB_DATABASE: ops_spine_ci
      TYPEDB_USERNAME: admin
      TYPEDB_PASSWORD: password
      TYPEDB_TLS: "false"
      CI_ARTIFACTS_DIR: ci_artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify typedb-driver version
        run: |
          python -c "
          import importlib.metadata as m
          v = m.version('typedb-driver')
          print(f'typedb-driver version: {v}')
          assert v.startswith('3.8'), f'Expected 3.8.x, got {v}'
          "

      - name: Lint check
        run: ruff check typedb_ops_spine/ tests/ --output-format=github

      - name: Wait for TypeDB readiness (protocol round-trip)
        run: |
          python -c "
          from typedb_ops_spine.readiness import connect_with_retries
          import os
          connect_with_retries(
              os.environ['TYPEDB_ADDRESS'],
              os.environ['TYPEDB_USERNAME'],
              os.environ['TYPEDB_PASSWORD'],
              tls=os.environ.get('TYPEDB_TLS', 'false').lower() == 'true',
              ca_path=os.environ.get('TYPEDB_ROOT_CA_PATH') or None,
              retries=45,
              sleep_s=2.0
          )
          print('TypeDB is query-ready')
          "

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Ensure CI artifacts directory
        run: mkdir -p ci_artifacts

      - name: Run write canary
        if: always()
        run: |
          set +e
          ops-write-canary --database "ops_spine_canary"
          echo "CANARY_EXIT_CODE=$?" >> $GITHUB_ENV
          set -e

      - name: Run min write probe
        if: always()
        run: |
          set +e
          ops-min-write-probe \
            --database-prefix ops_probe \
            --schema examples/minimal_project/schema.tql \
            --migrations-dir examples/minimal_project/migrations
          echo "PROBE_EXIT_CODE=$?" >> $GITHUB_ENV
          set -e

      - name: Extract TSV diagnostics (always)
        if: always()
        run: ops-tsv-extract

      - name: Fail CI if canary/probe failed
        if: always()
        run: |
          EXIT_CODE=0
          if [ "${CANARY_EXIT_CODE:-0}" != "0" ]; then
            echo "::error::ops-write-canary exited ${CANARY_EXIT_CODE}"
            EXIT_CODE=1
          fi
          if [ "${PROBE_EXIT_CODE:-0}" != "0" ]; then
            echo "::error::ops-min-write-probe exited ${PROBE_EXIT_CODE}"
            EXIT_CODE=1
          fi
          if [ "$EXIT_CODE" != "0" ]; then
            exit 1
          fi

      - name: Upload CI artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.run_id }}
          path: ci_artifacts/
          retention-days: 7

  # Optional: test with newer TypeDB version (manual trigger only)
  test-compat:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        typedb-version: ["3.8.1"]
      fail-fast: false

    services:
      typedb:
        image: typedb/typedb:${{ matrix.typedb-version }}
        ports:
          - 1729:1729

    env:
      PYTHONPATH: .
      TYPEDB_ADDRESS: "localhost:1729"
      TYPEDB_DATABASE: ops_spine_compat
      TYPEDB_USERNAME: admin
      TYPEDB_PASSWORD: password
      TYPEDB_TLS: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: Wait for TypeDB readiness (protocol round-trip)
        run: |
          python -c "
          from typedb_ops_spine.readiness import connect_with_retries
          import os
          connect_with_retries(
              os.environ['TYPEDB_ADDRESS'],
              os.environ['TYPEDB_USERNAME'],
              os.environ['TYPEDB_PASSWORD'],
              tls=os.environ.get('TYPEDB_TLS', 'false').lower() == 'true',
              ca_path=os.environ.get('TYPEDB_ROOT_CA_PATH') or None,
              retries=45,
              sleep_s=2.0
          )
          print('TypeDB is query-ready')
          "
      - run: pytest tests/unit/ -v --tb=short
      - run: pytest tests/integration/ -v --tb=short
