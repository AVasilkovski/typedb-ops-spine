# Example GitHub Actions CI using typedb-ops-spine.
#
# Replace schema/migration paths with your project layout and update the pinned
# typedb-ops-spine ref when you adopt a newer validated commit or tag.

name: CI (TypeDB)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typedb-ci:
    runs-on: ubuntu-latest

    services:
      typedb:
        image: typedb/typedb:3.8.0
        ports:
          - 1729:1729

    env:
      PYTHONPATH: .
      TYPEDB_OPS_SPINE_REF: "c864a47a5d7c05c05e6f2d335c4835f71a17c9a6"
      TYPEDB_ADDRESS: "localhost:1729"
      TYPEDB_DATABASE: my_project_db
      TYPEDB_USERNAME: admin
      TYPEDB_PASSWORD: password
      TYPEDB_TLS: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "typedb-ops-spine @ git+https://github.com/AVasilkovski/typedb-ops-spine.git@${TYPEDB_OPS_SPINE_REF}"
          python -m pip install -e .

      - name: Wait for TypeDB readiness
        run: |
          python -c "
          from typedb_ops_spine.readiness import connect_with_retries
          import os
          driver = connect_with_retries(
              os.environ['TYPEDB_ADDRESS'],
              os.environ['TYPEDB_USERNAME'],
              os.environ['TYPEDB_PASSWORD'],
              tls=os.environ.get('TYPEDB_TLS', 'false').lower() == 'true',
              ca_path=os.environ.get('TYPEDB_ROOT_CA_PATH') or None,
              retries=45,
              sleep_s=2.0,
          )
          driver.close()
          print('TypeDB is query-ready')
          "

      - name: Apply schema
        run: |
          ops-apply-schema \
            --schema schema.tql \
            --database "$TYPEDB_DATABASE" \
            --auto-migrate-redeclarations \
            --scrub-only
          ops-apply-schema \
            --schema schema.tql \
            --database "$TYPEDB_DATABASE" \
            --migrations-dir migrations \
            --stamp-schema-version-head

      - name: Run migrations
        run: ops-migrate --migrations-dir migrations --database "$TYPEDB_DATABASE"

      - name: Schema health check
        run: ops-schema-health --migrations-dir migrations --database "$TYPEDB_DATABASE"

      - name: Smoke diagnostics
        run: >
          ops-typedb-diag --database "$TYPEDB_DATABASE" --require-db
          --smoke-query 'match $v isa schema_version, has ordinal $o; select $o; limit 1;'

      - name: Extract TSV diagnostics
        if: always()
        run: ops-tsv-extract
